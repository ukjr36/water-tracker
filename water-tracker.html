<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a1628">
<title>水分記録</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoi5rC05YiG6KiY6YyyIiwic2hvcnRfbmFtZSI6IuawtOWIhuiomOmMsiIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMGExNjI4IiwidGhlbWVfY29sb3IiOiIjMGExNjI4IiwiaWNvbnMiOlt7InNyYyI6ImRhdGE6aW1hZ2Uvc3ZnK3htbCw8c3ZnIHhtbG5zPSdodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2Zycgdmlld0JveD0nMCAwIDEwMCAxMDAnPjx0ZXh0IHk9Jy45ZW0nIGZvbnQtc2l6ZT0nOTAnPvCfkqc8L3RleHQ+PC9zdmc+Iiwic2l6ZXMiOiIxOTJ4MTkyIiwidHlwZSI6ImltYWdlL3N2Zyt4bWwifV19">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a1628;--card:#131d35;--card-border:#1e2d4a;--text:#e8edf5;--text-sub:#7a8ba8;
  --blue:#3b82f6;--blue-glow:rgba(59,130,246,.25);--green:#22c55e;--green-glow:rgba(34,197,94,.25);
  --red:#ef4444;--red-glow:rgba(239,68,68,.25);--btn-bg:#1a2744;--btn-border:#253554;
  --ring-bg:#1a2744;--undo-bg:rgba(59,130,246,.12);--undo-text:#60a5fa;
  color-scheme:dark;
}
.light{
  --bg:#f0f4f8;--card:#ffffff;--card-border:#e2e8f0;--text:#1a202c;--text-sub:#718096;
  --blue:#3b82f6;--blue-glow:rgba(59,130,246,.15);--green:#16a34a;--green-glow:rgba(22,163,74,.15);
  --red:#dc2626;--red-glow:rgba(220,38,38,.15);--btn-bg:#e8eef6;--btn-border:#d0d8e8;
  --ring-bg:#e2e8f0;--undo-bg:rgba(59,130,246,.08);--undo-text:#2563eb;
  color-scheme:light;
}
html{background:#0a1628 !important;min-height:100%}
html.light-html{background:#f0f4f8 !important}
html,body{height:100%;font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif}
body{background:var(--bg) !important;color:var(--text);display:flex;flex-direction:column;align-items:center;
  overflow-y:auto;-webkit-overflow-scrolling:touch;transition:background .3s,color .3s}
.container{width:100%;max-width:420px;padding:16px 16px 32px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.header h1{font-size:1.5rem;font-weight:800;letter-spacing:-.02em}
.header .date{font-size:.82rem;color:var(--text-sub);margin-top:2px}
.theme-toggle{background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--text);
  width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.1rem;transition:all .2s}
.theme-toggle:active{transform:scale(.92)}
.day-selector{display:flex;align-items:center;justify-content:center;gap:12px;margin:8px 0 16px;font-size:.88rem}
.day-btn{background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--text-sub);
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1rem;transition:all .2s}
.day-btn:active{transform:scale(.9)}
.day-label{color:var(--text);font-weight:600;min-width:100px;text-align:center}
.ring-wrap{display:flex;justify-content:center;margin:12px 0 20px;position:relative}
.ring-container{position:relative;width:200px;height:200px}
.ring-bg{fill:none;stroke:var(--ring-bg);stroke-width:10}
.ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .6s ease,stroke .4s}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-val{font-size:2.6rem;font-weight:800;letter-spacing:-.03em}
.ring-val span{font-size:1rem;font-weight:500;color:var(--text-sub)}
.ring-goal{font-size:.82rem;color:var(--text-sub);margin-top:2px}
.ring-pct{font-size:.72rem;font-weight:700;padding:2px 10px;border-radius:20px;margin-top:6px;
  display:inline-block;transition:background .3s,color .3s}
#waveCanvas{position:absolute;bottom:0;left:50%;transform:translateX(-50%);border-radius:50%;
  width:180px;height:180px;pointer-events:none;clip-path:circle(50%)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:14px 16px;transition:all .3s}
.stat-label{font-size:.72rem;color:var(--text-sub);margin-bottom:4px}
.stat-val{font-size:1.5rem;font-weight:800}
.undo-row{display:flex;justify-content:center;margin-bottom:10px}
.undo-btn{background:var(--undo-bg);border:1px solid transparent;color:var(--undo-text);
  font-size:.8rem;font-weight:600;padding:6px 18px;border-radius:10px;cursor:pointer;
  transition:all .2s;opacity:.7}
.undo-btn:hover{opacity:1}
.undo-btn:active{transform:scale(.95)}
.undo-btn:disabled{opacity:.3;cursor:default}
.pattern-switch{display:flex;gap:8px;margin-bottom:12px}
.pattern-btn{flex:1;background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--text-sub);
  font-size:.78rem;font-weight:700;padding:8px 0;border-radius:10px;cursor:pointer;transition:all .2s}
.pattern-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.pattern-btn:active{transform:scale(.96)}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.add-btn{background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--text);
  font-size:1.05rem;font-weight:700;padding:18px 0;border-radius:14px;cursor:pointer;
  transition:all .15s;-webkit-tap-highlight-color:transparent}
.add-btn:active{transform:scale(.96);background:var(--blue);border-color:var(--blue);color:#fff}
.chart-card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:16px;transition:all .3s}
.chart-title{font-size:.88rem;font-weight:700;color:var(--blue);margin-bottom:14px}
.bars{display:flex;align-items:flex-end;justify-content:space-between;height:100px;gap:6px;margin-bottom:8px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:6px 6px 3px 3px;min-height:3px;transition:height .5s ease,background .3s}
.bar-label{font-size:.68rem;color:var(--text-sub)}
.bar-label.today{color:var(--blue);font-weight:700}
.legend{display:flex;justify-content:center;gap:14px;margin-top:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.68rem;color:var(--text-sub)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
.pop{animation:pop .25s ease}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card);border:1px solid var(--card-border);color:var(--text);
  padding:10px 20px;border-radius:12px;font-size:.82rem;font-weight:600;opacity:0;
  transition:all .3s;pointer-events:none;z-index:99;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ios-hint{display:none;text-align:center;font-size:.72rem;color:var(--text-sub);margin-bottom:12px;
  background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:10px 14px;line-height:1.6}
.ios-hint.visible{display:block}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <div><h1>水分記録</h1><div class="date" id="dateDisplay"></div></div>
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" aria-label="テーマ切替">🌙</button>
  </div>
  <div class="day-selector">
    <button class="day-btn" onclick="changeDay(-1)">◀</button>
    <span class="day-label" id="dayLabel"></span>
    <button class="day-btn" onclick="changeDay(1)">▶</button>
  </div>
  <div class="ring-wrap">
    <div class="ring-container">
      <svg viewBox="0 0 200 200" width="200" height="200">
        <circle class="ring-bg" cx="100" cy="100" r="88"/>
        <circle class="ring-fill" id="ringFill" cx="100" cy="100" r="88"
          stroke-dasharray="553" stroke-dashoffset="553" transform="rotate(-90 100 100)"/>
      </svg>
      <canvas id="waveCanvas" width="180" height="180"></canvas>
      <div class="ring-center">
        <div class="ring-val" id="ringVal">0 <span>ml</span></div>
        <div class="ring-goal">/ 2000 ml</div>
        <div class="ring-pct" id="ringPct">0%</div>
      </div>
    </div>
  </div>
  <div class="stats">
    <div class="stat-card"><div class="stat-label">今日の合計</div><div class="stat-val" id="totalVal">0 ml</div></div>
    <div class="stat-card"><div class="stat-label">あと</div><div class="stat-val" id="remainVal">2000 ml</div></div>
  </div>
  <div class="ios-hint" id="iosHint">📲 ホーム画面に追加するには<br>Safari の <strong>共有ボタン</strong> →「<strong>ホーム画面に追加</strong>」をタップ</div>
  <div class="undo-row"><button class="undo-btn" id="undoBtn" onclick="undoLast()" disabled>↩ 元に戻す</button></div>
  <div class="pattern-switch">
    <button class="pattern-btn active" id="pat1" onclick="switchPattern(1)">A: 100/150/200/600</button>
    <button class="pattern-btn" id="pat2" onclick="switchPattern(2)">B: 100/150/500/720</button>
  </div>
  <div class="btn-grid" id="btnGrid"></div>
  <div class="chart-card">
    <div class="chart-title">過去7日間</div>
    <div class="bars" id="bars"></div>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot" style="background:var(--blue)"></span>1~1999 ml</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--green)"></span>2000 ml</div>
      <div class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>2001 ml~</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const GOAL=2000,CIRC=2*Math.PI*88;
const PATTERNS={1:[100,150,200,600],2:[100,150,500,720]};
let currentDate=todayStr(),history={},themeMode='dark',currentPattern=1;

function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function shortLabel(s){
  if(s===todayStr())return'今日';
  const parts=s.split('-');
  return`${parseInt(parts[1])}/${parseInt(parts[2])}`;
}
function getTotal(d){return(history[d]||[]).reduce((a,b)=>a+b,0)}
function loadData(){try{const r=localStorage.getItem('water-app-data');history=r?JSON.parse(r):{}}catch(e){history={}}}
function saveData(){try{localStorage.setItem('water-app-data',JSON.stringify(history))}catch(e){}}
function loadTheme(){try{themeMode=localStorage.getItem('water-app-theme')||'dark'}catch(e){themeMode='dark'}applyTheme(themeMode)}
function saveTheme(t){try{localStorage.setItem('water-app-theme',t)}catch(e){}}
function loadPattern(){try{currentPattern=parseInt(localStorage.getItem('water-app-pattern'))||1}catch(e){currentPattern=1}}
function savePattern(p){try{localStorage.setItem('water-app-pattern',p)}catch(e){}}
function applyTheme(t){themeMode=t;if(t==='light'){document.body.classList.add('light');document.documentElement.classList.add('light-html');document.documentElement.style.colorScheme='light'}else{document.body.classList.remove('light');document.documentElement.classList.remove('light-html');document.documentElement.style.colorScheme='dark'}document.getElementById('themeBtn').textContent=t==='light'?'☀️':'🌙';document.querySelector('meta[name=theme-color]').content=t==='light'?'#f0f4f8':'#0a1628'}
function toggleTheme(){applyTheme(themeMode==='light'?'dark':'light');saveTheme(themeMode)}
function switchPattern(p){
  currentPattern=p;savePattern(p);
  document.getElementById('pat1').classList.toggle('active',p===1);
  document.getElementById('pat2').classList.toggle('active',p===2);
  renderButtons();
}
function renderButtons(){
  const grid=document.getElementById('btnGrid');grid.innerHTML='';
  PATTERNS[currentPattern].forEach(ml=>{
    const btn=document.createElement('button');btn.className='add-btn';
    btn.textContent=`${ml} ml`;btn.onclick=()=>addWater(ml);
    grid.appendChild(btn);
  });
}
function changeDay(delta){
  const parts=currentDate.split('-');
  const d=new Date(parseInt(parts[0]),parseInt(parts[1])-1,parseInt(parts[2]));
  d.setDate(d.getDate()+delta);
  const s=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  if(s>todayStr())return;
  currentDate=s;updateUI();
}
function addWater(ml){if(!history[currentDate])history[currentDate]=[];history[currentDate].push(ml);saveData();updateUI();showToast(`+${ml} ml`);const rv=document.getElementById('ringVal');rv.classList.remove('pop');void rv.offsetWidth;rv.classList.add('pop')}
function undoLast(){const arr=history[currentDate];if(!arr||!arr.length)return;const rm=arr.pop();saveData();updateUI();showToast(`-${rm} ml 取り消し`)}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),1200)}
function getColor(t){if(t>=2001)return{c:'var(--red)',g:'var(--red-glow)',cls:'red'};if(t>=2000)return{c:'var(--green)',g:'var(--green-glow)',cls:'green'};return{c:'var(--blue)',g:'var(--blue-glow)',cls:'blue'}}
function getBarColor(t){if(t>=2001)return'var(--red)';if(t>=2000)return'var(--green)';return'var(--blue)'}
function updateUI(){const total=getTotal(currentDate),remain=Math.max(0,GOAL-total),pct=Math.round(total/GOAL*100),color=getColor(total);document.getElementById('dayLabel').textContent=currentDate===todayStr()?'今日':shortLabel(currentDate);document.getElementById('dateDisplay').textContent=currentDate;const offset=CIRC-(CIRC*Math.min(total/GOAL,1));const ring=document.getElementById('ringFill');ring.style.strokeDashoffset=offset;ring.style.stroke=color.c;document.getElementById('ringVal').innerHTML=`${total} <span>ml</span>`;document.getElementById('totalVal').textContent=`${total} ml`;document.getElementById('remainVal').textContent=`${remain} ml`;const pctEl=document.getElementById('ringPct');pctEl.textContent=`${pct}%`;pctEl.style.background=color.g;pctEl.style.color=color.c;document.getElementById('undoBtn').disabled=!(history[currentDate]&&history[currentDate].length>0);waveColor=color.cls;renderBars()}
function renderBars(){
  const c=document.getElementById('bars');c.innerHTML='';
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();
    d.setDate(d.getDate()-i);
    days.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  }
  const mx=Math.max(GOAL,...days.map(d=>getTotal(d)));
  days.forEach(day=>{
    const t=getTotal(day),h=mx>0?Math.max(3,(t/mx)*90):3;
    const col=document.createElement('div');col.className='bar-col';
    const bar=document.createElement('div');bar.className='bar';
    bar.style.height=h+'px';bar.style.background=t>0?getBarColor(t):'var(--ring-bg)';
    const lbl=document.createElement('div');lbl.className='bar-label'+(day===todayStr()?' today':'');
    lbl.textContent=shortLabel(day);col.appendChild(bar);col.appendChild(lbl);c.appendChild(col);
  });
}
const canvas=document.getElementById('waveCanvas'),ctx=canvas.getContext('2d');let waveColor='blue',wavePhase=0;
function drawWave(){const total=getTotal(currentDate),fillRatio=Math.min(total/GOAL,1),w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);if(fillRatio<=0){requestAnimationFrame(drawWave);return}const waterH=fillRatio*h,baseY=h-waterH;wavePhase+=0.03;const colors={blue:['rgba(59,130,246,0.25)','rgba(59,130,246,0.15)'],green:['rgba(34,197,94,0.25)','rgba(34,197,94,0.15)'],red:['rgba(239,68,68,0.25)','rgba(239,68,68,0.15)']};const[c1,c2]=colors[waveColor]||colors.blue;ctx.beginPath();ctx.moveTo(0,h);for(let x=0;x<=w;x++){ctx.lineTo(x,baseY+Math.sin(x*0.04+wavePhase)*6+Math.sin(x*0.02+wavePhase*0.7)*4)}ctx.lineTo(w,h);ctx.closePath();ctx.fillStyle=c1;ctx.fill();ctx.beginPath();ctx.moveTo(0,h);for(let x=0;x<=w;x++){ctx.lineTo(x,baseY+Math.sin(x*0.035+wavePhase*1.3+1)*5+Math.sin(x*0.025+wavePhase*0.5+2)*3+4)}ctx.lineTo(w,h);ctx.closePath();ctx.fillStyle=c2;ctx.fill();requestAnimationFrame(drawWave)}
function setupInstall(){const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);const isStandalone=window.navigator.standalone||window.matchMedia('(display-mode: standalone)').matches;if(isStandalone||!isIOS)return;document.getElementById('iosHint').classList.add('visible')}
function init(){loadData();loadTheme();loadPattern();switchPattern(currentPattern);updateUI();drawWave();setupInstall()}
init();
</script>
</body>
</html>
